<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuickAid</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#123d2c">

<style>

/* YOUR ORIGINAL CSS IS UNCHANGED */

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}

html{scroll-behavior:smooth;}

body{
background:#f3fbf6;
color:#163322;
transition:background .3s ease,color .3s ease;
}

.masthead{
width:100%;
overflow:hidden;
background:linear-gradient(90deg,#132c17,#4d6528,#a1ae1c,#eddb80);
}

.masthead img{
width:100%;
max-height:500px;
object-fit:cover;
display:block;
}

.top-controls{
background:#0f2f22;
padding:14px 20px;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
flex-wrap:wrap;
}

.toggle-label{color:white;font-weight:bold;font-size:.95rem;}

.switch{position:relative;display:inline-block;width:54px;height:28px;}

.switch input{opacity:0;width:0;height:0;}

.slider{
position:absolute;
cursor:pointer;
inset:0;
background-color:#d8e8de;
transition:.3s;
border-radius:999px;
}

.slider:before{
position:absolute;
content:"";
height:22px;
width:22px;
left:3px;
bottom:3px;
background-color:white;
transition:.3s;
border-radius:50%;
}

.switch input:checked+.slider{background-color:#2d7a59;}

.switch input:checked+.slider:before{transform:translateX(26px);}

.navbar{
background:#123d2c;
display:flex;
justify-content:center;
gap:28px;
padding:14px 20px;
flex-wrap:wrap;
position:sticky;
top:0;
z-index:50;
}

.navbar a{color:white;text-decoration:none;font-weight:bold;font-size:.96rem;}

.navbar a:hover{text-decoration:underline;}

.container{max-width:1180px;margin:28px auto;padding:20px;}

.hero-grid,.main-grid,.feature-grid{display:grid;gap:22px;}

.hero-grid{grid-template-columns:1.1fr .9fr;margin-bottom:22px;}

.main-grid{grid-template-columns:1.05fr .95fr;margin-bottom:22px;}

.feature-grid{grid-template-columns:repeat(3,1fr);margin-bottom:22px;}

.card{
background:#fff;
border-radius:20px;
padding:26px;
box-shadow:0 10px 28px rgba(0,0,0,.08);
transition:background .3s ease,color .3s ease;
}

.pill{
display:inline-block;
background:#dff3e8;
color:#123d2c;
padding:7px 14px;
border-radius:999px;
font-size:.85rem;
font-weight:bold;
margin-bottom:14px;
}

h2{color:#123d2c;margin-bottom:12px;}

h3{margin:18px 0 10px;color:#1b5a41;}

p,li{line-height:1.6;}

ul{padding-left:20px;}

.feature-card h3{margin-top:0;}

label{display:block;margin:14px 0 8px;font-weight:bold;}

select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #c8d9cf;
font-size:1rem;
background:#fff;
color:#163322;
}

.btn-row{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:18px;
}

.main-btn,.secondary-btn{
padding:13px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:.95rem;
}

.main-btn{
background:linear-gradient(135deg,#123d2c,#1b5a41);
color:white;
}

.secondary-btn{
background:#e7f3ec;
color:#123d2c;
}

.score-box{
margin-top:16px;
padding:14px;
border-radius:14px;
background:#eef8f2;
border-left:5px solid #1b5a41;
}

.result{
display:none;
margin-top:18px;
padding:20px;
border-radius:16px;
background:#eef8f2;
border-left:6px solid #1b5a41;
}

.priority{
display:inline-block;
padding:8px 14px;
border-radius:999px;
font-weight:bold;
margin-bottom:12px;
}

.low{background:#dff3e8;color:#1b5a41;}

.medium{background:#fff3cd;color:#7a5a00;}

.high{background:#fde2e2;color:#8b1e1e;}

.warning{
margin-top:18px;
padding:14px;
border-radius:14px;
background:#fff7d8;
border-left:5px solid #e0b400;
color:#6b5700;
}

.danger-box{
margin-top:16px;
padding:14px;
border-radius:14px;
background:#fde7e7;
border-left:5px solid #d9534f;
color:#7a1f1f;
}

.checklist{display:grid;gap:10px;margin-top:12px;}

.check-item{
display:flex;
gap:10px;
align-items:flex-start;
background:#f7fcf9;
border:1px solid #dcebe2;
padding:12px;
border-radius:12px;
}

.check-item input{margin-top:3px;transform:scale(1.1);}

.mini-note{font-size:.93rem;color:#4b6758;}

.references-list li{margin-bottom:10px;}

footer{text-align:center;padding:24px;color:#476355;font-size:.95rem;}

body.dark-mode{background:#0f1412;color:#edf7f0;}

body.dark-mode .top-controls,
body.dark-mode .navbar{background:#081c15;}

body.dark-mode .card{background:#18211c;color:#edf7f0;}

@media(max-width:980px){
.hero-grid,.main-grid,.feature-grid{grid-template-columns:1fr;}
.btn-row{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<header id="home" class="masthead">
<img src="masthead.png" alt="QuickAid Masthead">
</header>

<div class="top-controls">
<span class="toggle-label">Light / Dark Mode</span>
<label class="switch">
<input type="checkbox" id="themeToggle" onclick="toggleDarkMode()">
<span class="slider"></span>
</label>
</div>

<nav class="navbar">
<a href="#home">Home</a>
<a href="#features">Features</a>
<a href="#assessment">Assessment</a>
<a href="#about">About</a>
<a href="#references">References</a>
</nav>

<div class="container">

<!-- YOUR ORIGINAL CONTENT REMAINS EXACTLY THE SAME -->

<div class="main-grid">

<section id="assessment" class="card">

<div class="pill">Assessment Form</div>
<h2>Minor Wound Evaluation</h2>

<label for="injuryType">Type of wound</label>
<select id="injuryType">
<option value="">Select wound type</option>
<option value="cut">Minor Cut</option>
<option value="burn">Minor Burn</option>
<option value="bite">Insect Bite</option>
<option value="abrasion">Abrasion / Scrape</option>
</select>

<label for="severity">Observed condition</label>
<select id="severity">
<option value="">Select condition</option>
<option value="mild">Mild</option>
<option value="moderate">Moderate</option>
<option value="serious">Looks serious</option>
</select>

<label for="bleeding">Is there active bleeding?</label>
<select id="bleeding">
<option value="">Select answer</option>
<option value="no">No</option>
<option value="mild">Yes, mild</option>
<option value="heavy">Yes, heavy</option>
</select>

<label for="herbalAvailable">Are natural remedies available?</label>
<select id="herbalAvailable">
<option value="">Select answer</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<h3>Symptom Checklist</h3>

<div class="checklist">
<label class="check-item"><input type="checkbox" class="symptom" value="redness"> Severe redness</label>
<label class="check-item"><input type="checkbox" class="symptom" value="swelling"> Swelling</label>
<label class="check-item"><input type="checkbox" class="symptom" value="pus"> Pus or discharge</label>
<label class="check-item"><input type="checkbox" class="symptom" value="pain"> Unusual pain</label>
<label class="check-item"><input type="checkbox" class="symptom" value="fever"> Fever</label>
<label class="check-item"><input type="checkbox" class="symptom" value="spreading"> Spreading irritation</label>
</div>

<div class="btn-row">
<button class="main-btn" onclick="generateQuickAid()">Generate Recommendation</button>
<button class="secondary-btn" onclick="resetAssessment()">Start New Assessment</button>
<button class="secondary-btn" onclick="downloadReport()">Download Report</button>
</div>

</section>

<section class="card">

<div class="pill">Generated Output</div>

<div id="scoreBox" class="score-box">
<strong>Risk Score:</strong> Not generated yet
</div>

<div id="result" class="result"></div>

<div id="hospitalBox" style="display:none;margin-top:15px;">
<button class="main-btn" onclick="findHospital()">Find Nearby Hospitals</button>
</div>

</section>

</div>
</div>

<footer>
QuickAid © 2026 | Prototype Web Based First Aid Recommendation System
</footer>

<script>

/* DARK MODE */

function toggleDarkMode(){
document.body.classList.toggle("dark-mode");
localStorage.setItem("theme",document.body.classList.contains("dark-mode"));
}

window.onload=function(){
if(localStorage.getItem("theme")==="true"){
document.body.classList.add("dark-mode");
document.getElementById("themeToggle").checked=true;
}
}

/* RESET */

function resetAssessment(){
document.querySelectorAll("select").forEach(e=>e.value="");
document.querySelectorAll(".symptom").forEach(e=>e.checked=false);
document.getElementById("result").style.display="none";
document.getElementById("hospitalBox").style.display="none";
document.getElementById("scoreBox").innerHTML="<strong>Risk Score:</strong> Not generated yet";
}

/* DOWNLOAD */

function downloadReport(){
let text=document.getElementById("result").innerText;

if(!text){
alert("Generate a recommendation first.");
return;
}

let blob=new Blob([text],{type:"text/plain"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="QuickAid_Report.txt";
a.click();
}

/* HOSPITAL */

function findHospital(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

window.open(`https://www.google.com/maps/search/hospital/@${lat},${lon},15z`);

});
}

/* MAIN SYSTEM */

function generateQuickAid(){

let severity=document.getElementById("severity").value;
let bleeding=document.getElementById("bleeding").value;
let result=document.getElementById("result");
let hospitalBox=document.getElementById("hospitalBox");
let score=0;

/* SEVERITY */

if(severity==="mild")score+=1;
if(severity==="moderate")score+=3;
if(severity==="serious")score+=5;

/* BLEEDING */

if(bleeding==="mild")score+=2;
if(bleeding==="heavy")score+=4;

/* SYMPTOMS */

document.querySelectorAll(".symptom:checked").forEach(symptom=>{

if(symptom.value==="fever"||symptom.value==="pus"||symptom.value==="spreading")
score+=2;
else
score+=1;

});

/* MAX LIMIT */

if(score>10)score=10;

/* PRIORITY */

let priority="Low Priority";
let className="low";

if(score>=7){priority="High Priority";className="high";}
else if(score>=4){priority="Moderate Priority";className="medium";}

document.getElementById("scoreBox").innerHTML=`<strong>Risk Score:</strong> ${score} / 10`;

result.innerHTML=`
<div class="priority ${className}">${priority}</div>
<p><strong>Follow basic wound cleaning and monitoring procedures.</strong></p>
`;

result.style.display="block";

if(priority==="High Priority"){
hospitalBox.style.display="block";

result.innerHTML+=`
<div class="danger-box">
This case appears serious. Seek professional medical attention immediately.
</div>
`;

}else{
hospitalBox.style.display="none";
}

}

</script>

</body>
</html>
